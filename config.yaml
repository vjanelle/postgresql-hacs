slug: postgresql18
name: PostgreSQL 18
description: PostgreSQL 18 server with declarative provisioning for Home Assistant
version: "0.1.0"
url: "https://github.com/vjanelle/postgresql-hacs"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
ports:
  "5432/tcp": 5432
ports_description:
  "5432/tcp": PostgreSQL server
map:
  - type: ssl
    read_only: true
options:
  roles: []
  databases: []
  memberships: []
  grants: []
  ssl:
    enabled: false
  network:
    allowlist: []
schema:
  roles:
    - username: str
      password: password?
      login: bool
  databases:
    - name: str
      owner: str
  memberships:
    - group: str
      member: str
  grants:
    - database: str
      role: str
      privileges:
        - str
  ssl:
    enabled: bool
    certfile: str?
    keyfile: str?
  network:
    allowlist:
      - str
