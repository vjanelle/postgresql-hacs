slug: postgresql18
name: PostgreSQL 18
version: "1.0.0"
startup: auto
image: "ghcr.io/example/postgresql18:latest"
ports:
  - "5432/tcp"
map:
  "/data": "/var/lib/postgresql/data"
  "/ssl": "/etc/postgresql/ssl"
options:
  roles: []
  databases: []
  memberships: []
  grants: []
  ssl:
    enabled: false
  network:
    allowlist: []
schema:
  roles:
    type: list
    required: false
    default: []
    schema:
      type: map
      fields:
        username: string
        password: string
        login: boolean
  databases:
    type: list
    required: false
    default: []
    schema:
      type: map
      fields:
        name: string
        owner: string
  memberships:
    type: list
    required: false
    default: []
    schema:
      type: map
      fields:
        group: string
        member: string
  grants:
    type: list
    required: false
    default: []
    schema:
      type: map
      fields:
        database: string
        role: string
        privileges:
          type: list
          schema:
            type: string
  ssl:
    type: map
    required: false
    default:
      enabled: false
    fields:
      enabled: boolean
      certfile: string
      keyfile: string
  network:
    type: map
    required: false
    default: {}
    fields:
      allowlist:
        type: list
        required: false
        default: []
        schema:
          type: string
