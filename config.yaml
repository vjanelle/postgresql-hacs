slug: postgresql18
name: PostgreSQL 18
version: "1.0.0"
startup: auto
image: "ghcr.io/example/postgresql18:latest"
ports:
  - "5432/tcp"
map:
  "/data": "/var/lib/postgresql/data"
  "/ssl": "/etc/postgresql/ssl"
options:
  roles: []
  databases: []
  memberships: []
  grants: []
  ssl:
    enabled: false
  network:
    allowed_cidrs: []
schema: {}
